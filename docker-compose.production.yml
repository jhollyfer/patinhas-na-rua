name: patinhas

services:
  app:
    image: ${DOCKER_USERNAME}/patinhas-app:latest
    restart: unless-stopped
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.patinhas-app.rule=Host(`patinhas-na-rua.maiyu.com.br`) || Host(`www.patinhas-na-rua.maiyu.com.br`)"
      - "traefik.http.routers.patinhas-app.entrypoints=websecure"
      - "traefik.http.routers.patinhas-app.tls.certresolver=myresolver"
      - "traefik.http.services.patinhas-app.loadbalancer.server.port=3000"
      - "traefik.http.routers.patinhas-app-http.rule=Host(`patinhas-na-rua.maiyu.com.br`) || Host(`www.patinhas-na-rua.maiyu.com.br`)"
      - "traefik.http.routers.patinhas-app-http.entrypoints=web"
      - "traefik.http.routers.patinhas-app-http.middlewares=https-only@file"

networks:
  traefik-network:
    external: true
